name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: macos-latest
            node: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
      - run: node scripts/workflow/roadmap_audit.js --assert --json > roadmap-audit-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-roadmap-audit-${{ matrix.os }}-node${{ matrix.node }}
          path: roadmap-audit-report.json

  pack-smoke:
    name: Pack Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm pack --dry-run --json > pack-dry-run.json
      - run: node scripts/smoke_pack_install.js --pack --json > smoke-pack-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-pack-smoke-${{ matrix.os }}
          path: |
            pack-dry-run.json
            smoke-pack-report.json

  benchmark:
    runs-on: ubuntu-latest
    needs:
      - test
      - pack-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/workflow/benchmark.js --runs 3 --assert-slo --json > benchmark-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-benchmark-report
          path: |
            benchmark-report.json
            .workflow/benchmarks/latest.json
