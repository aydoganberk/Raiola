name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node scripts/workflow/roadmap_audit.js --assert --json > roadmap-audit-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-roadmap-audit
          path: roadmap-audit-report.json

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/workflow/benchmark.js --runs 3 --assert-slo --json > benchmark-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-benchmark-report
          path: |
            benchmark-report.json
            .workflow/benchmarks/latest.json
