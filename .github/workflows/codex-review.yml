name: codex-review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - run: npm test
      - name: Prepare Raiola doctor packet
        run: mkdir -p .workflow/reports && node scripts/workflow/doctor.js --json > .workflow/reports/doctor.json
      - name: Upload doctor packet
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: raiola-doctor
          path: .workflow/reports/doctor.json
