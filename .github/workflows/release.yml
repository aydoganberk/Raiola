name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm after smoke checks
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pack-smoke:
    name: Release Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - run: npm test
      - run: node scripts/smoke_pack_install.js --pack --json > smoke-pack-report.json
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-smoke-${{ matrix.os }}
          path: smoke-pack-report.json

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: pack-smoke
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11
      - run: npm --version
      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          node -e "const version=require('./package.json').version; const tag=process.env.GITHUB_REF_NAME; if (tag !== `v${version}`) { throw new Error(`Tag ${tag} does not match package.json version v${version}`); }"
      - name: Publish with trusted publishing
        if: ${{ env.NPM_TOKEN == '' }}
        run: npm publish --provenance --access public
      - name: Publish with npm token fallback
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Generate release notes from CHANGELOG
        run: node scripts/release/release_notes_from_changelog.js --tag "${GITHUB_REF_NAME}" --output release-notes.md
      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          fi
