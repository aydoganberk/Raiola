name: Cut Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to cut from main
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      allow_empty_changelog:
        description: Allow release even if Unreleased has no entries
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - run: npm test
      - run: npm run pack:smoke
      - run: node scripts/workflow/roadmap_audit.js --assert --json > roadmap-audit-report.json
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Cut release files
        id: cut
        run: |
          args=(--bump "${{ inputs.bump }}")
          if [ "${{ inputs.allow_empty_changelog }}" = "true" ]; then
            args+=(--allow-empty)
          fi
          node scripts/release/cut_release.js "${args[@]}"
        shell: bash
      - name: Commit release
        run: |
          git add package.json scripts/workflow/product_version.js CHANGELOG.md
          git commit -m "chore(release): ${{ steps.cut.outputs.tag }}"
      - name: Tag release
        run: git tag "${{ steps.cut.outputs.tag }}"
      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags
