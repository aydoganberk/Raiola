#:schema https://developers.openai.com/codex/config-schema.json
# Generated by rai codex setup
# Repo-local Codex defaults for Raiola.
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
profile = "raiola-monorepo"
project_root_markers = [".git", ".codex", "package.json", "pnpm-workspace.yaml", "turbo.json", "nx.json", "Cargo.toml", "go.work", "pyproject.toml", "pom.xml", "settings.gradle", "WORKSPACE", "MODULE.bazel"]

[sandbox_workspace_write]
network_access = false

[features]
codex_hooks = false

[agents]
max_threads = 8
max_depth = 2

[profiles.raiola-balanced]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
web_search = "cached"
network_access = false
agents_max_threads = 5
agents_max_depth = 1
write_scope_mode = "task-root"
verify_mode = "targeted"
explicit_write_boundary_required = false
package_first = false
browser_proof_preferred = false

[profiles.raiola-strict]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
web_search = "cached"
network_access = false
agents_max_threads = 5
agents_max_depth = 2
write_scope_mode = "explicit-write-boundary"
verify_mode = "contract-required"
explicit_write_boundary_required = true
package_first = false
browser_proof_preferred = false

[profiles.raiola-frontend]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
web_search = "cached"
network_access = false
agents_max_threads = 5
agents_max_depth = 1
write_scope_mode = "surface-bounded"
verify_mode = "browser-proof-preferred"
explicit_write_boundary_required = false
package_first = false
browser_proof_preferred = true

[profiles.raiola-monorepo]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
web_search = "cached"
network_access = false
agents_max_threads = 8
agents_max_depth = 2
write_scope_mode = "changed-packages-first"
verify_mode = "package-contract-first"
explicit_write_boundary_required = true
package_first = true
browser_proof_preferred = false

[profiles.raiola-locked]
approval_policy = "untrusted"
sandbox_mode = "read-only"
model_reasoning_effort = "medium"
web_search = "cached"
network_access = false
agents_max_threads = 4
agents_max_depth = 1
write_scope_mode = "read-only"
verify_mode = "read-only-review"
explicit_write_boundary_required = false
package_first = false
browser_proof_preferred = false

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.raiolaWorkflowState]
command = "node"
args = ["scripts/workflow/mcp_server.js", "--server", "workflow-state", "--repo", "."]
cwd = "."

[mcp_servers.raiolaPolicy]
command = "node"
args = ["scripts/workflow/mcp_server.js", "--server", "policy", "--repo", "."]
cwd = "."

[mcp_servers.raiolaThreadMemory]
command = "node"
args = ["scripts/workflow/mcp_server.js", "--server", "thread-memory", "--repo", "."]
cwd = "."
